metadata_version: 1
name: variant-viewer
description: Interactive R Shiny viewer for annotated variant data. Displays pre-processed
  VCF files with SnpEff annotations, providing sortable tables, allele frequency plots,
  karyotype visualization, and IGV genome browser. Advanced filtering by gene, consequence,
  impact, and quality metrics.
tags:
- clinical genomics
